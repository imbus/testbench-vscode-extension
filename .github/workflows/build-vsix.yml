name: Build VSIX Package

on:
  push:
    branches:
      - playground # Name of the branch to trigger the workflow

jobs:
  build:
    runs-on: ubuntu-latest # Use the latest version of Ubuntu as the runner

    steps:
      # Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '23' # Use the Node.js version compatible with the project

      # Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Package the extension
      - name: Build VSIX Package
        run: npm run package # package command should be defined in the package.json

      # Upload the VSIX as an artifact
      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v3
        with:
          name: testbench-visual-studio-code-extension # Name of the artifact
          path: "testbench-visual-studio-code-extension-0.0.1.vsix" # Adjust if the file is stored in a specific folder
