name: Build VSIX Package

on:
    push:
        branches:
            - main # Name of the branch to trigger the workflow. Multiple branches can be specified each on a new line
            - playground
            - feature
    pull_request:
        branches:
            - main
            - playground
            - feature

jobs:
    build:
        runs-on: ubuntu-latest # Use the latest version of Ubuntu as the runner

        steps:
            # Checkout the repository
            - name: Checkout Code
              uses: actions/checkout@v4

            # Set up Node.js
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  # Use the latest LTS Node.js version
                  node-version: "lts/*"
                  check-latest: true
                  cache: "npm"

            # Install Node.js dependencies
            - name: Install Node.js Dependencies
              run: npm ci

            # Set up Python
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
                  cache: "pip" # Enable caching of pip downloaded packages

            # Install Python build tools
            - name: Install Python Build Tools
              run: |
                  python -m pip install --upgrade pip
                  pip install pip-tools nox

            # Prepare Python dependencies (tasks.py logic)
            - name: Clean previous bundled Python libs
              run: |
                  rm -rf bundled/libs
                  mkdir -p bundled/libs

            - name: Generate requirements.txt for Python
              id: pip-compile
              run: pip-compile --resolver=backtracking --output-file=requirements.txt pyproject.toml

            - name: Bundle Python Dependencies using Nox
              id: nox-bundle
              run: python -m nox --session bundle_dependencies

            # Package the extension
            - name: Build VSIX Package
              run: npm run vsix-package # vsix-package command should be defined in the package.json

            # List all files for debugging
            # - name: List All Files For Debugging
            #   run: ls -alR | grep -v '^node_modules' # Lists all files and directories in the current directory

            # Verify the VSIX file was created
            - name: Verify VSIX was created
              id: verify_vsix
              run: |
                  VSIX_FILES=(*.vsix)
                  if [ ${#VSIX_FILES[@]} -eq 0 ]; then
                    echo "No .vsix file found!"
                    exit 1
                  elif [ ${#VSIX_FILES[@]} -gt 1 ]; then
                    echo "Multiple .vsix files found: ${VSIX_FILES[*]}"
                  fi
                  echo "VSIX_PATH=${VSIX_FILES[0]}" >> $GITHUB_OUTPUT
                  ls -l *.vsix

            # Upload the VSIX as an artifact
            - name: Upload VSIX Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: testbench-extension-${{ github.run_number }} # Name of the artifact
                  path: ${{ steps.verify_vsix.outputs.VSIX_PATH }} # Use the exact path from the verify step
                  if-no-files-found: error # Fail if no VSIX file is found
                  overwrite: true # Overwrite the artifact if it already exists
