# Name of the workflow: Release
name: Release

# Trigger the workflow only manually
on:
    workflow_dispatch:
        inputs:
            release_type:
                description: "Type of release"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major
                    - prerelease
            dry_run:
                description: "Run in dry-run mode (no actual release)"
                required: false
                default: false
                type: boolean

jobs:
    release:
        name: Create Release
        # Specify the virtual environment to run the job
        runs-on: ubuntu-latest

        steps:
            # Step 1: Checkout the source code from the repository
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Important for semantic-release to analyze all commits

            # Step 2: Set up Node.js environment with the specified version
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  # Use the latest LTS Node.js version
                  node-version: "lts/*"
                  check-latest: true
                  # Use the default npm registry
                  registry-url: "https://registry.npmjs.org/"

            # Step 3: Install project dependencies in a clean state
            - name: Install dependencies
              run: npm ci

            # Set up Python
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
                  cache: "pip"

            # Install Python build tools
            - name: Install Python Build Tools
              run: |
                  python -m pip install --upgrade pip
                  pip install pip-tools nox

            # Prepare Python dependencies
            - name: Clean previous bundled Python libs
              run: |
                  rm -rf bundled/libs
                  mkdir -p bundled/libs

            - name: Generate requirements.txt for Python
              id: pip-compile
              run: pip-compile --resolver=backtracking --output-file=requirements.txt pyproject.toml
              continue-on-error: true

            - name: Bundle Python Dependencies using Nox
              id: nox-bundle
              run: python -m nox --session bundle_dependencies
              continue-on-error: true

            # Step 4: Install VS Code Extension Manager
            - name: Install VSCE
              run: npm install -g @vscode/vsce

            # Step 5: Run semantic-release to handle versioning and changelog generation
            - name: Run semantic-release
              env:
                  # Provide GitHub token to allow semantic-release to interact with GitHub
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Override release type if specified
                  RELEASE_TYPE: ${{ inputs.release_type }}
                  DRY_RUN: ${{ inputs.dry_run }}
              run: |
                  if [ "$DRY_RUN" = "true" ]; then
                      echo "Running semantic-release in dry-run mode..."
                      npm run release -- --dry-run
                  else
                      echo "Running semantic-release for $RELEASE_TYPE release..."
                      npx semantic-release
                  fi

            # Step 5: Get the new version from package.json
            # - name: Get Version
            #   id: get_version
            #   run: |
            #       echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

            # Step 6: Publish the extension to the Visual Studio Code Marketplace
